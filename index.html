<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PNG画像をRGBA 32bit形式に変換できるブラウザツールです。">

  <meta property="og:title" content="PNG 32bit Converter">
  <meta property="og:description" content="PNG画像をRGBA 32bit形式に変換できるブラウザツールです。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ignseed.github.io/PNG-32bit-Converter/">
  <meta property="og:image" content="Sample.png">
  <meta property="og:site_name" content="PNG 32bit Converter">
  <meta property="og:locale" content="ja_JP">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="PNG 32bit Converter">
  <meta name="twitter:description" content="PNG画像をRGBA 32bit形式に変換できるブラウザツールです。">
  <meta name="twitter:image" content="https://ignseed.github.io/PNG-32bit-Converter/Sample.png">

  <title>PNG 32bit Converter</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <main class="converter">
    <header class="page-header">
      <h1>PNG 32bit Converter</h1>
      <p>PNG画像をRGBA 32bit形式に変換します。</p>
    </header>

    <section class="panel" aria-label="PNG変換">
      <label class="drop-zone" id="dropZone" for="fileInput">
        <span class="drop-icon" aria-hidden="true">＋</span>
        <strong>PNGファイルを選択</strong>
        <span>または、ここにドラッグ＆ドロップ</span>
        <small>複数ファイルを選択できます</small>
        <input type="file" id="fileInput" accept=".png,image/png" multiple>
      </label>

      <div class="file-list" id="fileList" aria-live="polite"></div>

      <div class="summary" id="summary" hidden>
        <span>選択: <strong id="countVal">0</strong>件</span>
        <span>完了: <strong id="doneVal">0</strong>件</span>
      </div>

      <div class="actions">
        <button class="primary-button" id="convertBtn" type="button" disabled>
          32bitに変換してダウンロード
        </button>
        <button class="text-button" id="clearBtn" type="button" hidden>
          選択をクリア
        </button>
      </div>

      <div class="message" id="message" role="status" aria-live="polite" hidden></div>
    </section>

    <p class="privacy-note">画像はサーバーへ送信されず、ブラウザ内で処理されます。</p>
  </main>
</body>
</html>
